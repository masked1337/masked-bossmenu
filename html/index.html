<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MASKED BOSS MENU</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/bd904a6a6b.js" crossorigin="anonymous"></script>

  <style>
    :root {
      --masked-yellow: #e1a213; 
      --bright-yellow: #ffc107; 
      --glow-yellow: rgba(225, 162, 19, 0.3);
      --dark-bg: #0a0a0c; 
      --panel-bg: rgba(255, 255, 255, 0.02);
      --border-color: rgba(225, 162, 19, 0.2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Chakra Petch', sans-serif;
      user-select: none;
    }

    body {
      background: transparent;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .container {
      width: 1100px;
      height: 700px;
      background: var(--dark-bg);
      border: 1px solid var(--border-color);
      border-left: 5px solid var(--masked-yellow);
      display: flex;
      flex-direction: column;
      transform: scale(0.95);
      opacity: 0;
      transition: all 0.3s ease-out;
      position: relative;
    }

    .container.open {
      transform: scale(1);
      opacity: 1;
    }

    .header {
      height: 100px;
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(90deg, rgba(225, 162, 19, 0.05) 0%, transparent 100%);
      border-bottom: 1px solid var(--border-color);
    }

    .title h1 {
      color: #fff;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      line-height: 1;
    }

    .title span {
      color: var(--masked-yellow);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 5px;
      text-transform: uppercase;
    }

    .stats-bar {
      display: flex;
      gap: 20px;
    }

    .stat-box {
      width: 140px;
      height: 50px;
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .stat-label {
      font-size: 9px;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-value {
      font-size: 18px;
      color: #fff;
      font-weight: 700;
    }

    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 350px 1fr; 
      overflow: hidden;
    }

    .left-panel {
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      background: rgba(0, 0, 0, 0.1);
    }

    .search-area {
      padding: 25px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .input-field {
      height: 45px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 0 15px;
    }

    .input-field input {
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      width: 100%;
      margin-left: 10px;
      font-size: 13px;
      text-transform: uppercase;
    }

    .filter-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
    }

    .tab {
      height: 35px;
      background: rgba(255, 255, 255, 0.05);
      border: none;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    .tab.active {
      background: var(--masked-yellow);
      color: #000;
    }

    .btn-hire {
      height: 45px;
      background: transparent;
      border: 1px solid var(--masked-yellow);
      color: var(--masked-yellow);
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      text-transform: uppercase;
      margin-top: 5px;
      transition: 0.2s;
    }

    .btn-hire:hover {
      background: var(--masked-yellow);
      color: #000;
    }

    .employee-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 25px 25px;
    }

    .employee-list::-webkit-scrollbar { width: 3px; }
    .employee-list::-webkit-scrollbar-thumb { background: var(--masked-yellow); }

    .item-card {
      height: 70px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      padding: 0 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    .item-card:hover { background: rgba(225, 162, 19, 0.05); }

    .item-card.active {
      border-left: 3px solid var(--masked-yellow);
      background: rgba(225, 162, 19, 0.1);
    }

    .card-avatar {
      width: 40px;
      height: 40px;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--masked-yellow);
      font-weight: 700;
      border: 1px solid var(--border-color);
    }

    .card-meta { flex: 1; margin-left: 15px; }
    .card-name { color: #fff; font-size: 14px; font-weight: 600; text-transform: uppercase; }
    .card-rank { color: rgba(255, 255, 255, 0.3); font-size: 10px; text-transform: uppercase; }

    .card-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .status-on { background: var(--masked-yellow); box-shadow: 0 0 10px var(--masked-yellow); }
    .status-off { background: #333; }

    .right-panel {
      padding: 50px;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 30px;
      margin-bottom: 40px;
    }

    .p-avatar {
      width: 110px;
      height: 110px;
      background: #111;
      border: 2px solid var(--masked-yellow);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: #fff;
      font-weight: 700;
    }

    .p-info h2 { font-size: 40px; color: #fff; text-transform: uppercase; line-height: 1; }
    .p-tag {
      display: inline-block;
      margin-top: 10px;
      padding: 5px 15px;
      background: rgba(225, 162, 19, 0.15);
      color: var(--masked-yellow);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    .box {
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      padding: 20px;
    }

    .box-label { color: rgba(255, 255, 255, 0.3); font-size: 10px; text-transform: uppercase; margin-bottom: 5px; }
    .box-value { color: #fff; font-size: 20px; font-weight: 700; text-transform: uppercase; }

    .steam-info {
      border: 1px solid var(--border-color);
      background: rgba(0, 0, 0, 0.2);
    }

    .s-row {
      display: flex;
      justify-content: space-between;
      padding: 15px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .s-row:last-child { border: none; }
    .s-label { color: rgba(255, 255, 255, 0.4); font-size: 11px; font-weight: 600; }
    .s-value { color: #fff; font-size: 13px; font-weight: 500; }

    .actions {
      margin-top: auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .btn-action {
      height: 60px;
      background: transparent;
      border: 1px solid var(--masked-yellow);
      color: #fff;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: 0.2s;
    }

    .btn-action:hover { background: var(--masked-yellow); color: #000; }
    .btn-action.fire { border-color: #ff3333; color: #ff3333; }
    .btn-action.fire:hover { background: #ff3333; color: #fff; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.1);
      text-align: center;
    }

    .empty-state i { font-size: 50px; margin-bottom: 15px; color: var(--masked-yellow); opacity: 0.2; }
  </style>
</head>
<body>

  <div class="overlay" id="overlay">
    <div class="container" id="container">
      
      <div class="header">
        <div class="title">
          <h1 id="orgTitle">ORGANIZACIJA</h1>
          <span>ORGANIZACIJA</span>
        </div>
        <div class="stats-bar">
          <div class="stat-box">
            <span class="stat-label">ONLINE</span>
            <span class="stat-value" id="onlineCount">0</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">UKUPNO</span>
            <span class="stat-value" id="totalCount">0</span>
          </div>
        </div>
      </div>

      <div class="main">
        <div class="left-panel">
          <div class="search-area">
            <div class="input-field">
              <i class="fas fa-search" style="color: var(--masked-yellow)"></i>
              <input type="text" id="searchInput" placeholder="PRETRAZI...">
            </div>
            <div class="filter-tabs">
              <button class="tab active" data-filter="all">SVI</button>
              <button class="tab" data-filter="online">AKTIVNI</button>
              <button class="tab" data-filter="offline">OFFLINE</button>
            </div>
            <button class="btn-hire" id="hireBtn">
                <i class="fas fa-plus-circle"></i> ZAPOSLI IGRACA
            </button>
          </div>
          <div class="employee-list" id="employeeList"></div>
        </div>

        <div class="right-panel" id="rightPanel">
          <div class="empty-state">
            <i class="fas fa-shield-alt"></i>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const overlay = document.getElementById('overlay');
    const container = document.getElementById('container');
    const employeeList = document.getElementById('employeeList');
    const rightPanel = document.getElementById('rightPanel');
    const searchInput = document.getElementById('searchInput');
    
    let employees = [];
    let activeFilter = 'all';
    let searchTerm = '';
    let selectedId = null;

    function getInitials(name) {
      if (!name) return 'X';
      return name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
    }

    function renderDetails(emp) {
      if (!emp) {
        rightPanel.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-shield-alt"></i>
          </div>`;
        return;
      }

      rightPanel.innerHTML = `
        <div class="profile-header">
          <div class="p-avatar">${getInitials(emp.name)}</div>
          <div class="p-info">
            <h2>${emp.name}</h2>
            <div class="p-tag">${emp.online ? 'STATUS: AKTIVAN' : 'STATUS: OFFLINE'}</div>
          </div>
        </div>
        
        <div class="details-grid">
          <div class="box">
            <div class="box-label">RANK</div>
            <div class="box-value">${emp.job_rank || 'REGRUT'}</div>
          </div>
          <div class="box">
            <div class="box-label">GRADE</div>
            <div class="box-value">${emp.grade || '0'}</div>
          </div>
        </div>

        <div class="steam-info">
          <div class="s-row">
            <span class="s-label">IDENTIFIKATOR</span>
            <span class="s-value" style="color: var(--masked-yellow)">${emp.identifier}</span>
          </div>
          <div class="s-row">
            <span class="s-label">STEAM IME</span>
            <span class="s-value">${emp.steam_name || 'NEPOZNATO'}</span>
          </div>
        </div>

        <div class="actions">
          <button class="btn-action" onclick="sendAction('promote', '${emp.identifier}')">
            <i class="fas fa-chevron-up"></i> UNAPREDI
          </button>
          <button class="btn-action fire" onclick="sendAction('fire', '${emp.identifier}')">
            <i class="fas fa-user-slash"></i> OTPUSTI
          </button>
        </div>
      `;
    }

    function renderList() {
      const filtered = employees.filter(e => {
        const matchesFilter = activeFilter === 'all' || (activeFilter === 'online' ? e.online : !e.online);
        const matchesSearch = e.name.toLowerCase().includes(searchTerm.toLowerCase());
        return matchesFilter && matchesSearch;
      });

      employeeList.innerHTML = filtered.map(e => `
        <div class="item-card ${e.identifier === selectedId ? 'active' : ''}" onclick="select('${e.identifier}')">
          <div class="card-avatar">${getInitials(e.name)}</div>
          <div class="card-meta">
            <div class="card-name">${e.name}</div>
            <div class="card-rank">${e.job_rank}</div>
          </div>
          <div class="card-status ${e.online ? 'status-on' : 'status-off'}"></div>
        </div>
      `).join('');
    }

    window.select = (id) => {
      selectedId = id;
      renderList();
      renderDetails(employees.find(e => e.identifier === id));
    };

    window.sendAction = (type, id) => {
      const endpoint = type === 'promote' ? 'unaprijediKurvu' : 'dajotkazKurvi';
      fetch(`https://${GetParentResourceName()}/${endpoint}`, {
        method: 'POST',
        body: JSON.stringify({ identifier: id })
      });
    };

    window.addEventListener('message', (event) => {
      if (event.data.action === 'otvoriKurvu') {
        employees = event.data.zaposljeni || [];
        document.getElementById('orgTitle').textContent = (event.data.label || 'ORGANIZACIJA').toUpperCase();
        document.getElementById('totalCount').textContent = employees.length;
        document.getElementById('onlineCount').textContent = employees.filter(e => e.online).length;
        
        overlay.style.display = 'flex';
        setTimeout(() => container.classList.add('open'), 50);
        renderList();
        renderDetails(null);
      }
    });

    document.querySelectorAll('.tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelector('.tab.active').classList.remove('active');
        tab.classList.add('active');
        activeFilter = tab.dataset.filter;
        renderList();
      };
    });

    searchInput.oninput = (e) => { searchTerm = e.target.value; renderList(); };

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        container.classList.remove('open');
        setTimeout(() => {
          overlay.style.display = 'none';
          fetch(`https://${GetParentResourceName()}/nuiClosed`, { method: 'POST' });
        }, 300);
      }
    });

    document.getElementById('hireBtn').onclick = () => {
      fetch(`https://${GetParentResourceName()}/zaposliKurvu`, { method: 'POST' });
    };
  </script>
</body>
</html>
